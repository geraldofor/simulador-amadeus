<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Amadeus - Especialização Anti-ADM</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        header {
            margin-bottom: 15px;
        }
        .container {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }
        /* Painel Lateral de Instruções */
        .painel-missao {
            flex: 1;
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #00ff00;
            overflow-y: auto;
        }
        /* A Tela Preta do Amadeus */
        .terminal-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            background-color: #000;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .tela-preta {
            flex: 1;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            white-space: pre-wrap;
            overflow-y: auto;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .linha-comando {
            display: flex;
            align-items: center;
            background-color: #111;
            padding: 8px;
            border-radius: 4px;
        }
        .prompt {
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            margin-right: 10px;
            user-select: none;
        }
        #input-comando {
            flex: 1;
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            outline: none;
            text-transform: uppercase;
        }
        .btn-avancar {
            background-color: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
            display: none;
        }
        .badge {
            background-color: #444;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h2>Simulador Avançado GDS Amadeus</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span class="badge" id="missao-cia">Cia: --</span>
            <span class="badge" id="missao-status">Módulo: Carregando...</span>
        </div>
    </header>

    <div class="container">
        <div class="painel-missao">
            <h3 id="titulo-missao">Carregando missão...</h3>
            <p id="desc-missao">Aguarde o carregamento do banco de dados.</p>
            <hr style="border-color: #444;">
            <h4>🎯 Instrução Atual:</h4>
            <p id="instrucao-passo" style="font-size: 18px; color: #ffcc00; font-weight: bold;">Siga as instruções do terminal.</p>
            <div id="feedback-ajuda" style="color: #ff6666; margin-top: 15px; font-style: italic;"></div>
            <button class="btn-avancar" id="btn-proxima-missao" onclick="proximaMissao()">Ir para Próxima Missão ➡️</button>
        </div>

        <div class="terminal-container">
            <div class="tela-preta" id="amadeus-screen">
AMADEUS GDS - SISTEMA DE TREINAMENTO HOMOLOGADO
AGUARDANDO INICIALIZAÇÃO DO MOTOR LÓGICO...
            </div>
            
            <div class="linha-comando">
                <span class="prompt">&gt;</span>
                <input type="text" id="input-comando" placeholder="DIGITE O COMANDO E APERTE ENTER" autofocus autocomplete="off">
            </div>
        </div>
    </div>

    <script src="js/motor.js"></script>
</body>
</html>
